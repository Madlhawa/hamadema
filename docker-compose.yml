version: '3.8'

x-airflow-common:
  &airflow-common
  build: ./airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-scraper_user}:${POSTGRES_PASSWORD:-supersecret}@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-this_is_a_very_secure_secret_key_12345}
    # Project Specific Envs
    POSTGRES_DB: ${POSTGRES_DB:-lanka_aggregator}
    POSTGRES_USER: ${POSTGRES_USER:-scraper_user}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    MEILI_HOST: http://meilisearch:7700
    MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKeyToChange123}
    PROXY_LIST: ${PROXY_LIST:-}
    PROXY_USERNAME: ${PROXY_USERNAME:-}
    PROXY_PASSWORD: ${PROXY_PASSWORD:-}
    PROXY_HOST: ${PROXY_HOST:-gate.decodo.com}
    PROXY_PORT: ${PROXY_PORT:-10001}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scraper:/opt/app/scraper
    - ./transformer:/opt/app/transformer
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scraper_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
      POSTGRES_DB: ${POSTGRES_DB:-lanka_aggregator}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-scraper_user}"]
      interval: 10s
      retries: 5
      start_period: 5s

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: meilisearch_engine
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKeyToChange123}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: flask_backend
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKeyToChange123}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-lanka_aggregator}
      - POSTGRES_USER=${POSTGRES_USER:-scraper_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-supersecret}
    depends_on:
      - meilisearch
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: caddy_server
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  meilisearch_data:
  airflow_logs:
  caddy_data:
  caddy_config:
