<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamadema</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="landing-mode">
    <div class="container">
        <header class="header-container">
            <a href="/" class="logo" style="text-decoration: none;">
                <h1>Hamadema</h1>
                <p>Everything you need. Search products across multiple Sri Lankan sites instantly.</p>
            </a>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search for products (e.g. laptop, phone)..." autofocus autocomplete="off">
                <button onclick="performSearch()" title="Search" aria-label="Search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
                <div id="autocompleteDropdown" class="autocomplete-dropdown hidden"></div>
            </div>
        </header>

        <button id="mobileFilterBtn" class="mobile-filter-btn" onclick="toggleMobileFilters()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
            Filters
        </button>
        <div id="drawerOverlay" class="drawer-overlay" onclick="toggleMobileFilters()"></div>

        <main>
            <div class="layout-grid">
                <aside class="sidebar">
                    <h3 class="sidebar-title">Filters</h3>
                    
                    <div class="filter-group">
                        <label for="sortFilter">Sort By</label>
                        <select id="sortFilter" onchange="performSearch()">
                            <option value="">Relevance</option>
                            <option value="price_numeric:asc">Price: Low to High</option>
                            <option value="price_numeric:desc">Price: High to Low</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Store</label>
                        <div class="checkbox-list">
                            <label><input type="checkbox" name="source" value="nanotek.lk" onchange="performSearch()"> Nanotek</label>
                            <label><input type="checkbox" name="source" value="bigdeals.lk" onchange="performSearch()"> BigDeals.lk</label>
                            <!-- You can add more stores dynamically or statically here -->
                        </div>
                    </div>

                    <div class="filter-group">
                        <label>Price Range (LKR)</label>
                        <div class="price-inputs">
                            <input type="number" id="minPrice" placeholder="Min" onchange="performSearch()">
                            <span>-</span>
                            <input type="number" id="maxPrice" placeholder="Max" onchange="performSearch()">
                        </div>
                    </div>

                    <div class="filter-group">
                        <label class="checkbox-label" style="display:flex; align-items:center; gap:8px;">
                            <input type="checkbox" id="inStock" onchange="performSearch()"> In Stock Only
                        </label>
                    </div>

                    <div id="dynamicFiltersContainer"></div>
                </aside>

                <div class="results-container">
                    <div id="results" class="results-grid"></div>
                    <div id="scrollAnchor" style="height: 20px; width: 100%;"></div>
                </div>
            </div>
        </main>
    </div>

        <div id="compareFooter" class="compare-footer"></div>

        <div id="compareModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Product Comparison</h2>
                    <button class="close-btn" onclick="closeCompareModal()">&times;</button>
                </div>
                <div id="compareTableContainer" class="modal-body"></div>
            </div>
        </div>

    <script>
        let currentPage = 1;
        let totalPagesCount = 1;
        let isFetching = false;

        const resultsDiv = document.getElementById('results');
        const scrollAnchor = document.getElementById('scrollAnchor');

        function toggleMobileFilters() {
            document.querySelector('.sidebar').classList.toggle('open');
            document.getElementById('drawerOverlay').classList.toggle('show');
        }

        let compareList = [];

        function toggleCompare(event, id, title, price, brand, ram, storage, source) {
            event.stopPropagation();
            
            const index = compareList.findIndex(item => item.id === id);
            if (index > -1) {
                compareList.splice(index, 1);
            } else {
                if (compareList.length >= 3) {
                    alert("You can compare up to 3 items at a time.");
                    event.target.checked = false;
                    return;
                }
                compareList.push({ id, title, price, brand, ram, storage, source });
            }
            renderCompareFooter();
        }

        function renderCompareFooter() {
            const footer = document.getElementById('compareFooter');
            if (compareList.length > 0) {
                footer.classList.add('show');
                footer.innerHTML = `<button class="compare-btn" onclick="openCompareModal()">Compare ${compareList.length} Items</button>`;
            } else {
                footer.classList.remove('show');
            }
        }

        function openCompareModal() {
            const modal = document.getElementById('compareModal');
            const tableContainer = document.getElementById('compareTableContainer');
            
            let html = '<table class="compare-table"><tr><th>Feature</th>';
            compareList.forEach(item => html += `<th>${item.source.replace('.lk', '')}</th>`);
            html += '</tr>';

            const fields = [
                { key: 'title', label: 'Product' },
                { key: 'price', label: 'Price' },
                { key: 'brand', label: 'Brand' },
                { key: 'ram', label: 'RAM' },
                { key: 'storage', label: 'Storage' }
            ];

            fields.forEach(field => {
                html += `<tr><td><strong>${field.label}</strong></td>`;
                compareList.forEach(item => {
                    html += `<td>${item[field.key] || '-'}</td>`;
                });
                html += `</tr>`;
            });

            html += '</table>';
            tableContainer.innerHTML = html;
            modal.style.display = 'flex';
        }

        function closeCompareModal() {
            document.getElementById('compareModal').style.display = 'none';
        }

        function showSkeletons(append) {
            let skeletonsHtml = '';
            for(let i=0; i<8; i++) {
                skeletonsHtml += `
                    <div class="card skeleton-card">
                        <div class="card-img-wrapper skeleton-img"></div>
                        <div class="card-content">
                            <div class="skeleton-text skeleton-title"></div>
                            <div class="skeleton-text skeleton-price"></div>
                        </div>
                    </div>
                `;
            }
            if (append) {
                resultsDiv.insertAdjacentHTML('beforeend', skeletonsHtml);
            } else {
                resultsDiv.innerHTML = skeletonsHtml;
            }
        }

        function removeSkeletons() {
            document.querySelectorAll('.skeleton-card').forEach(e => e.remove());
        }

        async function performSearch(page = 1, append = false) {
            if (isFetching) return;
            
            currentPage = page;
            const query = document.getElementById('searchInput').value;
            const sortFilter = document.getElementById('sortFilter').value;
            const minPrice = document.getElementById('minPrice').value;
            const maxPrice = document.getElementById('maxPrice').value;
            const inStock = document.getElementById('inStock').checked;
            
            const sourceCheckboxes = document.querySelectorAll('input[name="source"]:checked');
            const sources = Array.from(sourceCheckboxes).map(cb => cb.value).join(',');

            const dynamicCheckboxes = document.querySelectorAll('#dynamicFiltersContainer input[type="checkbox"]:checked');
            const activeFacets = {};
            dynamicCheckboxes.forEach(cb => {
                const facet = cb.getAttribute('data-facet');
                if (!activeFacets[facet]) activeFacets[facet] = [];
                activeFacets[facet].push(cb.value);
            });

            if (!append) {
                resultsDiv.innerHTML = '';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
            
            if (!query.trim()) return;

            document.body.classList.remove('landing-mode');
            document.body.classList.add('results-mode');

            isFetching = true;
            showSkeletons(append);

            try {
                let url = `/search?q=${encodeURIComponent(query)}&page=${currentPage}`;
                if (sortFilter) url += `&sort=${encodeURIComponent(sortFilter)}`;
                if (sources) url += `&source=${encodeURIComponent(sources)}`;
                if (minPrice) url += `&min_price=${encodeURIComponent(minPrice)}`;
                if (maxPrice) url += `&max_price=${encodeURIComponent(maxPrice)}`;
                if (inStock) url += `&in_stock=true`;
                
                for (const [key, values] of Object.entries(activeFacets)) {
                    url += `&${key}=${encodeURIComponent(values.join(','))}`;
                }

                const res = await fetch(url);
                const data = await res.json();
                
                removeSkeletons();
                isFetching = false;

                if (data.error) {
                    if (!append) resultsDiv.innerHTML = `<p class="error">${data.error}</p>`;
                    return;
                }
                
                // Only update facets on the first page load to avoid filter jumping
                if (!append) {
                    renderDynamicFacets(data.facetDistribution, activeFacets);
                }

                totalPagesCount = Math.ceil(data.totalHits / data.limit) || 1;

                if (!data.hits || data.hits.length === 0) {
                    if (!append) {
                        resultsDiv.innerHTML = `
                            <div class="empty-state">
                                <h2>No exact matches found.</h2>
                                <p>Try adjusting your filters or explore popular categories:</p>
                                <div class="empty-suggestions">
                                    <button class="suggestion-btn" onclick="document.getElementById('searchInput').value='Laptop'; performSearch(1)">💻 Laptops</button>
                                    <button class="suggestion-btn" onclick="document.getElementById('searchInput').value='Monitor'; performSearch(1)">🖥️ Monitors</button>
                                    <button class="suggestion-btn" onclick="document.getElementById('searchInput').value='VGA'; performSearch(1)">🎮 Graphics Cards</button>
                                </div>
                            </div>
                        `;
                    }
                    return;
                }

                data.hits.forEach(item => {
                    const card = document.createElement('a');
                    if (item.url) {
                        card.href = item.url;
                        card.target = '_blank';
                    }
                    card.className = 'card';
                    card.style.textDecoration = 'none';
                    card.style.color = 'inherit';
                    
                    const isChecked = compareList.some(c => c.id === item.id) ? 'checked' : '';
                    
                    card.innerHTML = `
                        <label class="compare-checkbox" onclick="event.stopPropagation();">
                            <input type="checkbox" ${isChecked} onclick="toggleCompare(event, '${item.id}', '${(item.title || '').replace(/'/g, "\\'")}', '${item.price}', '${item.brand || ''}', '${item.ram || ''}', '${item.storage || ''}', '${item.source_site}')"> Compare
                        </label>
                        <div class="card-img-wrapper">
                            <span class="badge ${item.stock_status === 'In Stock' ? 'badge-in-stock' : 'badge-out-of-stock'}">${item.stock_status || 'Unknown'}</span>
                            ${item.image_url ? `<img src="${item.image_url}" alt="${(item.title || '').replace(/"/g, '&quot;')}" loading="lazy">` : `<div class="no-image">No Image</div>`}
                        </div>
                        <div class="card-content">
                            <h3>
                                ${item.title || 'Unknown Product'}
                                <span class="title-tag tag-source">${item.source_site.replace('.lk', '')}</span>
                            </h3>
                            <p class="price">${item.price || 'Price N/A'}</p>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                });

            } catch (err) {
                removeSkeletons();
                isFetching = false;
                if (!append) resultsDiv.innerHTML = `<p class="error">An error occurred while fetching results.</p>`;
            }
        }
        
        function renderDynamicFacets(facetDist, activeFacets) {
            const container = document.getElementById('dynamicFiltersContainer');
            container.innerHTML = '';
            if (!facetDist) return;

            const orderedFacets = ['category', 'brand', 'ram', 'storage'];
            const facetDisplayNames = {'category': 'Category', 'brand': 'Brand', 'ram': 'RAM', 'storage': 'Storage'};

            orderedFacets.forEach(facetKey => {
                const dist = facetDist[facetKey];
                if (!dist || Object.keys(dist).length === 0) return;

                const group = document.createElement('div');
                group.className = 'filter-group';
                group.innerHTML = `<label>${facetDisplayNames[facetKey]}</label>`;
                
                const list = document.createElement('div');
                list.className = 'checkbox-list';

                const sortedValues = Object.entries(dist).sort((a, b) => b[1] - a[1]);

                sortedValues.forEach(([val, count]) => {
                    const isChecked = activeFacets[facetKey] && activeFacets[facetKey].includes(val);
                    const label = document.createElement('label');
                    label.innerHTML = `<input type="checkbox" data-facet="${facetKey}" value="${val}" ${isChecked ? 'checked' : ''} onchange="performSearch(1)"> ${val} (${count})`;
                    list.appendChild(label);
                });

                group.appendChild(list);
                container.appendChild(group);
            });
        }

        // Infinite Scroll Observer
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && !isFetching && currentPage < totalPagesCount) {
                performSearch(currentPage + 1, true);
            }
        }, { rootMargin: "100px" });
        observer.observe(document.getElementById('scrollAnchor'));

        // Debounced Autocomplete on Input
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                fetchSuggestions();
            }, 300);
        });

        async function fetchSuggestions() {
            const query = document.getElementById('searchInput').value;
            const dropdown = document.getElementById('autocompleteDropdown');
            
            if (!query.trim()) {
                dropdown.classList.add('hidden');
                return;
            }
            
            try {
                const res = await fetch(`/search?q=${encodeURIComponent(query)}&limit=5`);
                const data = await res.json();
                
                if (!data.hits || data.hits.length === 0) {
                    dropdown.classList.add('hidden');
                    return;
                }
                
                const suggestions = new Set();
                const qLower = query.toLowerCase().trim();

                // 1. Suggest Category combinations
                if (data.facetDistribution && data.facetDistribution.category) {
                    const cats = data.facetDistribution.category;
                    const sortedCats = Object.entries(cats).sort((a,b) => b[1] - a[1]).map(e => e[0]);
                    
                    sortedCats.slice(0, 3).forEach(cat => {
                        const cLower = cat.toLowerCase();
                        if (cLower.startsWith(qLower)) {
                            // If typing "lap", suggest "Laptop"
                            suggestions.add(cLower);
                        } else if (!qLower.includes(cLower)) {
                            // If typing "asus", suggest "asus laptop"
                            suggestions.add(`${qLower} ${cLower}`);
                        }
                    });
                }

                // 2. Suggest Brand combinations
                if (data.facetDistribution && data.facetDistribution.brand) {
                    const brands = data.facetDistribution.brand;
                    const sortedBrands = Object.entries(brands).sort((a,b) => b[1] - a[1]).map(e => e[0]);
                    
                    sortedBrands.slice(0, 2).forEach(brand => {
                        const bLower = brand.toLowerCase();
                        if (bLower.startsWith(qLower)) {
                            suggestions.add(bLower);
                        } else if (!qLower.includes(bLower)) {
                            suggestions.add(`${bLower} ${qLower}`); // e.g. "asus macbook" (unlikely but possible), "apple mac"
                        }
                    });
                }

                // 3. Add top hit short names
                data.hits.slice(0, 3).forEach(hit => {
                    // Get first 3-4 words of the product title
                    const words = hit.title.replace(/[^a-zA-Z0-9 ]/g, '').split(/\s+/).slice(0, 4).join(' ').toLowerCase();
                    if (words.includes(qLower) && words !== qLower) {
                        suggestions.add(words);
                    }
                });

                if (suggestions.size === 0) {
                    dropdown.classList.add('hidden');
                    return;
                }
                
                let html = '';
                Array.from(suggestions).slice(0, 6).forEach(sugg => {
                    html += `
                        <div class="autocomplete-item" onclick="selectSuggestion('${sugg.replace(/'/g, "\\'")}')">
                            <div class="autocomplete-item-title" style="display:flex; align-items:center; gap:8px;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                                <span>${sugg}</span>
                            </div>
                        </div>
                    `;
                });
                dropdown.innerHTML = html;
                dropdown.classList.remove('hidden');
            } catch (e) {
                dropdown.classList.add('hidden');
            }
        }

        function selectSuggestion(title) {
            document.getElementById('searchInput').value = title;
            document.getElementById('autocompleteDropdown').classList.add('hidden');
            performSearch(1);
        }

        // Trigger search on Enter
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('autocompleteDropdown').classList.add('hidden');
                performSearch(1);
            }
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-box')) {
                document.getElementById('autocompleteDropdown').classList.add('hidden');
            }
        });
        
        // Ensure changing static filters resets to page 1
        document.querySelectorAll('aside select, aside input[type="checkbox"], aside input[type="number"]').forEach(el => {
            el.addEventListener('change', () => performSearch(1));
        });
    </script>
</body>
</html>
