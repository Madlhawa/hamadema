<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamadema</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Hamadema</h1>
            <p>Everything you need. Search products across multiple Sri Lankan sites instantly.</p>
        </header>

        <main>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search for products (e.g. laptop, phone)..." autofocus>
                <button onclick="performSearch()">Search</button>
            </div>

            <div class="layout-grid">
                <aside class="sidebar">
                    <h3 class="sidebar-title">Filters</h3>
                    
                    <div class="filter-group">
                        <label for="sortFilter">Sort By</label>
                        <select id="sortFilter" onchange="performSearch()">
                            <option value="">Relevance</option>
                            <option value="price_numeric:asc">Price: Low to High</option>
                            <option value="price_numeric:desc">Price: High to Low</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Store</label>
                        <div class="checkbox-list">
                            <label><input type="checkbox" name="source" value="nanotek.lk" onchange="performSearch()"> Nanotek</label>
                            <!-- You can add more stores dynamically or statically here -->
                        </div>
                    </div>

                    <div class="filter-group">
                        <label>Price Range (LKR)</label>
                        <div class="price-inputs">
                            <input type="number" id="minPrice" placeholder="Min" onchange="performSearch()">
                            <span>-</span>
                            <input type="number" id="maxPrice" placeholder="Max" onchange="performSearch()">
                        </div>
                    </div>

                    <div class="filter-group">
                        <label class="checkbox-label" style="display:flex; align-items:center; gap:8px;">
                            <input type="checkbox" id="inStock" onchange="performSearch()"> In Stock Only
                        </label>
                    </div>
                </aside>

                <div class="results-container">
                    <div id="loading" class="hidden">Loading results...</div>
                    <div id="results" class="results-grid"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function performSearch() {
            const query = document.getElementById('searchInput').value;
            const sortFilter = document.getElementById('sortFilter').value;
            const minPrice = document.getElementById('minPrice').value;
            const maxPrice = document.getElementById('maxPrice').value;
            const inStock = document.getElementById('inStock').checked;
            
            const sourceCheckboxes = document.querySelectorAll('input[name="source"]:checked');
            const sources = Array.from(sourceCheckboxes).map(cb => cb.value).join(',');

            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');

            resultsDiv.innerHTML = '';
            
            if (!query.trim()) return;

            loadingDiv.classList.remove('hidden');

            try {
                let url = `/search?q=${encodeURIComponent(query)}`;
                if (sortFilter) url += `&sort=${encodeURIComponent(sortFilter)}`;
                if (sources) url += `&source=${encodeURIComponent(sources)}`;
                if (minPrice) url += `&min_price=${encodeURIComponent(minPrice)}`;
                if (maxPrice) url += `&max_price=${encodeURIComponent(maxPrice)}`;
                if (inStock) url += `&in_stock=true`;

                const res = await fetch(url);
                const data = await res.json();
                
                loadingDiv.classList.add('hidden');

                if (data.error) {
                    resultsDiv.innerHTML = `<p class="error">${data.error}</p>`;
                    return;
                }

                if (data.length === 0) {
                    resultsDiv.innerHTML = '<p class="no-results">No products found.</p>';
                    return;
                }

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-img-wrapper">
                            ${item.image_url ? `<img src="${item.image_url}" alt="${item.title || 'Product'}" loading="lazy">` : `<div class="no-image">No Image</div>`}
                        </div>
                        <div class="card-content">
                            <h3>${item.title || 'Unknown Product'}</h3>
                            <p class="price">${item.price || 'Price N/A'}</p>
                            <p class="source">Source: ${item.source_site}</p>
                            ${item.url ? `<a href="${item.url}" target="_blank" class="btn">View Deal</a>` : ''}
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                });
            } catch (err) {
                loadingDiv.classList.add('hidden');
                resultsDiv.innerHTML = `<p class="error">An error occurred while fetching results.</p>`;
            }
        }

        // Trigger search on Enter
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
    </script>
</body>
</html>
